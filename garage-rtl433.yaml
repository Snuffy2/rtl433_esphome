substitutions:
  device_name: garage-rtl433-native
  friendly_name: Garage RTL433

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  comment: "Heltec WiFi LoRa 32 V2-style 433 MHz rtl_433 ESPHome gateway"

esp32:
  board: heltec_wifi_kit_32_v2
  framework:
    type: arduino

logger:

api:

time:
  - platform: homeassistant
    id: homeassistant_time

ota:
  - platform: esphome
    on_begin:
      - rtl433_native.stop: rtl433_gateway

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Fallback"
    password: !secret fallback_ap_password

captive_portal:

external_components:
  - source:
      type: local
      path: components

rtl433_native:
  id: rtl433_gateway
  time_id: homeassistant_time
  candidate_limit: 10
  stale_after: 1h
  known_sensors:
    - key: garage_combo_fridge
      name: "Garage Combo Fridge"
      mapping: "LaCrosse-TX141THBv2/0/203;TFA-303221/1/203"
      entities:
        - temperature
        - humidity
        - battery
        - rssi
        - stale
        - last_updated
        - mapping
    - key: garage_combo_freezer
      name: "Garage Combo Freezer"
      mapping: "TFA-303221/2/88;LaCrosse-TX141THBv2/1/88"
      entities:
        - temperature
        - humidity
        - battery
        - rssi
        - stale
        - last_updated
        - mapping
    - key: garage_freezer_1
      name: "Garage Freezer 1"
      mapping: "Acurite-986/1R/11932"
      entities:
        - temperature
        - battery
        - rssi
        - stale
        - last_updated
        - mapping
    - key: garage_freezer_2
      name: "Garage Freezer 2"
      mapping: "Acurite-986/2F/31274"
      entities:
        - temperature
        - battery
        - rssi
        - stale
        - last_updated
        - mapping
sensor:
  - platform: uptime
    name: "Uptime"
    entity_category: diagnostic
  - platform: wifi_signal
    name: "Wi-Fi RSSI"
    update_interval: 120s
    entity_category: diagnostic
  - platform: template
    name: "Free Heap"
    accuracy_decimals: 0
    unit_of_measurement: "B"
    update_interval: 120s
    lambda: return ESP.getFreeHeap();
    entity_category: diagnostic

text_sensor:
  - platform: wifi_info
    ip_address:
      name: 'IP Address'
      icon: mdi:ip-network
      entity_category: diagnostic

binary_sensor:
  - platform: status
    name: 'Status'
    entity_category: diagnostic

switch:
  - platform: template
    name: "Discovery Mode"
    id: rtl433_discovery_mode
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config
    turn_on_action:
      - lambda: id(rtl433_gateway).set_discovery_enabled(true);
    turn_off_action:
      - lambda: id(rtl433_gateway).set_discovery_enabled(false);

button:
  - platform: template
    name: "Clear Candidates"
    entity_category: config
    on_press:
      - rtl433_native.clear_candidates: rtl433_gateway
  - platform: template
    name: "Radio Status"
    entity_category: config
    on_press:
      - rtl433_native.status: rtl433_gateway
  - platform: restart
    name: Restart
    icon: mdi:restart
    entity_category: config

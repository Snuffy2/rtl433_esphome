substitutions:
  device_name: garage-rtl433-native
  friendly_name: Garage RTL433

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  comment: "Heltec WiFi LoRa 32 V2-style 433 MHz rtl_433 ESPHome gateway"
  libraries:
    - "rtl_433_ESP=git+https://github.com/NorthernMan54/rtl_433_ESP.git#v0.3.3"
    - RadioLib@6.2.0
    - Networking
    - SPI
    - EEPROM
  platformio_options:
    lib_ldf_mode: "chain+"
    build_flags:
      - "-DRF_SX1278"
      - "-DRF_MODULE_FREQUENCY=433.92"
      - "-DRF_MODULE_DIO0=26"
      - "-DRF_MODULE_DIO1=35"
      - "-DRF_MODULE_DIO2=34"
      - "-DRF_MODULE_RST=14"
      - "-DRF_MODULE_CS=18"
      - "-DRF_MODULE_SCK=5"
      - "-DRF_MODULE_MISO=19"
      - "-DRF_MODULE_MOSI=27"
      - "-I/root/.platformio/packages/framework-arduinoespressif32/libraries/Network/src"
      - "-include src/esphome/components/rtl433_native/ledc_compat.h"
  on_boot:
    priority: -100
    then:
      - lambda: |-
          pinMode(25, OUTPUT);
          digitalWrite(25, LOW);
      - lambda: |-
          id(rtl433_gateway).set_override("garage_combo_fridge", id(garage_combo_fridge_mapping).state);
          id(rtl433_gateway).set_override("garage_combo_freezer", id(garage_combo_freezer_mapping).state);
          id(rtl433_gateway).set_override("garage_freezer_1", id(garage_freezer_1_mapping).state);
          id(rtl433_gateway).set_override("garage_freezer_2", id(garage_freezer_2_mapping).state);

esp32:
  board: heltec_wifi_kit_32_v2
  framework:
    type: arduino

logger:

api:

time:
  - platform: homeassistant
    id: homeassistant_time

ota:
  - platform: esphome
    on_begin:
      - rtl433_native.stop: rtl433_gateway

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Fallback"
    password: !secret fallback_ap_password

captive_portal:

external_components:
  - source:
      type: local
      path: components

rtl433_native:
  id: rtl433_gateway
  time_id: homeassistant_time
  candidate_limit: 10
  stale_after: 1h
  known_sensors:
    - key: garage_combo_fridge
      mapping: "LaCrosse-TX141THBv2/0/203;TFA-303221/1/203"
      temperature:
        name: "Garage Combo Fridge"
      humidity:
        name: "Garage Combo Fridge Humidity"
        entity_category: diagnostic
      battery:
        name: "Garage Combo Fridge Battery"
        entity_category: diagnostic
      rssi:
        name: "Garage Combo Fridge RSSI"
        entity_category: diagnostic
      stale:
        name: "Garage Combo Fridge Stale"
        entity_category: diagnostic
      last_updated:
        name: "Garage Combo Fridge Last Updated"
        entity_category: diagnostic
    - key: garage_combo_freezer
      mapping: "TFA-303221/2/88;LaCrosse-TX141THBv2/1/88"
      temperature:
        name: "Garage Combo Freezer"
      humidity:
        name: "Garage Combo Freezer Humidity"
        entity_category: diagnostic
      battery:
        name: "Garage Combo Freezer Battery"
        entity_category: diagnostic
      rssi:
        name: "Garage Combo Freezer RSSI"
        entity_category: diagnostic
      stale:
        name: "Garage Combo Freezer Stale"
        entity_category: diagnostic
      last_updated:
        name: "Garage Combo Freezer Last Updated"
        entity_category: diagnostic
    - key: garage_freezer_1
      mapping: "Acurite-986/1R/11932"
      temperature:
        name: "Garage Freezer 1"
      battery:
        name: "Garage Freezer 1 Battery"
        entity_category: diagnostic
      rssi:
        name: "Garage Freezer 1 RSSI"
        entity_category: diagnostic
      stale:
        name: "Garage Freezer 1 Stale"
        entity_category: diagnostic
      last_updated:
        name: "Garage Freezer 1 Last Updated"
        entity_category: diagnostic
    - key: garage_freezer_2
      mapping: "Acurite-986/2F/31274"
      temperature:
        name: "Garage Freezer 2"
      battery:
        name: "Garage Freezer 2 Battery"
        entity_category: diagnostic
      rssi:
        name: "Garage Freezer 2 RSSI"
        entity_category: diagnostic
      stale:
        name: "Garage Freezer 2 Stale"
        entity_category: diagnostic
      last_updated:
        name: "Garage Freezer 2 Last Updated"
        entity_category: diagnostic
  last_packet:
    name: "Last Packet"
    entity_category: diagnostic
  packet_count:
    name: "Packet Count"
    entity_category: diagnostic
  known_packet_count:
    name: "Known Packet Count"
    entity_category: diagnostic
  unknown_packet_count:
    name: "Unknown Packet Count"
    entity_category: diagnostic
  discovery_enabled:
    name: "Discovery Enabled"
    entity_category: diagnostic
  candidates:
    - name: "Candidate 1"
      entity_category: diagnostic
    - name: "Candidate 2"
      entity_category: diagnostic
    - name: "Candidate 3"
      entity_category: diagnostic
    - name: "Candidate 4"
      entity_category: diagnostic
    - name: "Candidate 5"
      entity_category: diagnostic
    - name: "Candidate 6"
      entity_category: diagnostic
    - name: "Candidate 7"
      entity_category: diagnostic
    - name: "Candidate 8"
      entity_category: diagnostic
    - name: "Candidate 9"
      entity_category: diagnostic
    - name: "Candidate 10"
      entity_category: diagnostic

sensor:
  - platform: uptime
    name: "Uptime"
    entity_category: diagnostic
  - platform: wifi_signal
    name: "Wi-Fi RSSI"
    update_interval: 120s
    entity_category: diagnostic
  - platform: template
    name: "Free Heap"
    accuracy_decimals: 0
    unit_of_measurement: "B"
    update_interval: 120s
    lambda: return ESP.getFreeHeap();
    entity_category: diagnostic

text_sensor:
  - platform: wifi_info
    ip_address:
      name: 'IP Address'
      icon: mdi:ip-network
      entity_category: diagnostic

binary_sensor:
  - platform: status
    name: 'Status'
    entity_category: diagnostic

switch:
  - platform: template
    name: "Discovery Mode"
    id: rtl433_discovery_mode
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config
    turn_on_action:
      - lambda: id(rtl433_gateway).set_discovery_enabled(true);
    turn_off_action:
      - lambda: id(rtl433_gateway).set_discovery_enabled(false);

button:
  - platform: template
    name: "Clear Candidates"
    entity_category: config
    on_press:
      - rtl433_native.clear_candidates: rtl433_gateway
  - platform: template
    name: "Radio Status"
    entity_category: config
    on_press:
      - rtl433_native.status: rtl433_gateway
  - platform: restart
    name: Restart
    icon: mdi:restart
    entity_category: config


text:
  - platform: template
    name: "Garage Combo Fridge Mapping"
    id: garage_combo_fridge_mapping
    optimistic: true
    restore_value: true
    mode: text
    initial_value: "LaCrosse-TX141THBv2/0/203;TFA-303221/1/203"
    min_length: 3
    max_length: 240
    entity_category: config
    set_action:
      - lambda: id(rtl433_gateway).set_override("garage_combo_fridge", x);
  - platform: template
    name: "Garage Combo Freezer Mapping"
    id: garage_combo_freezer_mapping
    optimistic: true
    restore_value: true
    mode: text
    initial_value: "TFA-303221/2/88;LaCrosse-TX141THBv2/1/88"
    min_length: 3
    max_length: 240
    entity_category: config
    set_action:
      - lambda: id(rtl433_gateway).set_override("garage_combo_freezer", x);
  - platform: template
    name: "Garage Freezer 1 Mapping"
    id: garage_freezer_1_mapping
    optimistic: true
    restore_value: true
    mode: text
    initial_value: "Acurite-986/1R/11932"
    min_length: 3
    max_length: 240
    entity_category: config
    set_action:
      - lambda: id(rtl433_gateway).set_override("garage_freezer_1", x);
  - platform: template
    name: "Garage Freezer 2 Mapping"
    id: garage_freezer_2_mapping
    optimistic: true
    restore_value: true
    mode: text
    initial_value: "Acurite-986/2F/31274"
    min_length: 3
    max_length: 240
    entity_category: config
    set_action:
      - lambda: id(rtl433_gateway).set_override("garage_freezer_2", x);

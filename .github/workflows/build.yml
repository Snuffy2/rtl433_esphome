name: Build firmware

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      esphome_version:
        description: ESPHome version to build with
        required: false
        default: latest
      firmware_version:
        description: Firmware version label for manual builds
        required: false
        default: ""

permissions:
  contents: read

jobs:
  build:
    name: Build garage-rtl433.yaml
    runs-on: ubuntu-latest
    env:
      ESPHOME_VERSION: ${{ inputs.esphome_version || 'latest' }}
      ESPHOME_SUPPORTED_RANGE: esphome>=2026.5.3,<2027.0.0

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Prepare CI secrets
        run: cp secrets.yaml.example secrets.yaml

      - name: Generate build version
        id: version
        run: |
          version="${{ github.event.release.tag_name || inputs.firmware_version }}"
          if [ -z "$version" ]; then
            version="dev-${GITHUB_RUN_NUMBER}"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Install uv
        run: python -m pip install uv

      - name: Install build dependencies
        run: uv sync --dev

      - name: Select ESPHome version
        if: ${{ env.ESPHOME_VERSION != 'latest' }}
        run: uv pip install "esphome==${ESPHOME_VERSION}"

      - name: Update ESPHome to latest
        if: ${{ env.ESPHOME_VERSION == 'latest' }}
        run: uv pip install --upgrade "${ESPHOME_SUPPORTED_RANGE}"

      - name: Build firmware
        run: ./scripts/build --preflight

      - name: Move files for versioning
        run: ./scripts/package-firmware "${{ steps.version.outputs.version }}" "output/${{ steps.version.outputs.version }}"

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v7
        with:
          name: garage-rtl433-${{ steps.version.outputs.version }}
          path: output

name: Build firmware

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      esphome_version:
        description: ESPHome version to build with
        required: false
        default: latest
      firmware_version:
        description: Firmware version label for manual builds
        required: false
        default: ""

permissions:
  contents: read

jobs:
  build:
    name: Build garage-rtl433.yaml
    runs-on: ubuntu-latest
    env:
      ESPHOME_VERSION: ${{ inputs.esphome_version || 'latest' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Prepare CI secrets
        run: cp secrets.yaml.example secrets.yaml

      - name: Generate build version
        id: version
        run: |
          version="${{ github.event.release.tag_name || inputs.firmware_version }}"
          if [ -z "$version" ]; then
            version="dev-${GITHUB_RUN_NUMBER}"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Install build dependencies
        run: uv sync --dev

      - name: Select ESPHome version
        if: ${{ env.ESPHOME_VERSION != 'latest' }}
        run: uv pip install "esphome==${ESPHOME_VERSION}"

      - name: Update ESPHome to latest
        if: ${{ env.ESPHOME_VERSION == 'latest' }}
        run: uv pip install --upgrade esphome

      - name: Build firmware
        run: ./scripts/build --preflight

      - name: Move files for versioning
        run: |
          mkdir -p "output/${{ steps.version.outputs.version }}"
          firmware_bin="$(find .esphome/build -path '*/.pioenvs/*/firmware.bin' -print | sort)"
          firmware_count="$(printf '%s\n' "$firmware_bin" | sed '/^$/d' | wc -l | tr -d ' ')"
          if [ "$firmware_count" -ne 1 ]; then
            printf 'Expected one firmware.bin, found %s:\n' "$firmware_count" >&2
            printf '%s\n' "$firmware_bin" | sed '/^$/d; s/^/  /' >&2
            exit 1
          fi
          firmware_dir="$(dirname "$firmware_bin")"
          cp \
            "$firmware_dir/bootloader.bin" \
            "$firmware_dir/firmware.bin" \
            "$firmware_dir/firmware.elf" \
            "$firmware_dir/firmware.factory.bin" \
            "$firmware_dir/firmware.ota.bin" \
            "$firmware_dir/partitions.bin" \
            "output/${{ steps.version.outputs.version }}/"

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v7
        with:
          name: garage-rtl433-${{ steps.version.outputs.version }}
          path: output

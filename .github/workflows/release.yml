name: Release

on:
  release:
    types: [published]

concurrency:
  group: release-latest-${{ github.repository }}
  queue: max
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Update version and validate release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.target_commitish }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml

      - name: Cache ESPHome and PlatformIO
        uses: actions/cache@v5
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            .esphome/external_components
          key: ${{ runner.os }}-release-esphome-pio-${{ hashFiles('pyproject.toml', 'rtl433-esphome-heltec-lora-32-v2.yaml', 'components/rtl433_native/__init__.py') }}
          restore-keys: |
            ${{ runner.os }}-release-esphome-pio-

      - name: Update pyproject version
        run: python .github/scripts/update_pyproject_version.py "${{ github.event.release.tag_name }}"

      - name: Commit and push version changes
        if: ${{ !github.event.release.prerelease }}
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          branch: ${{ github.event.release.target_commitish }}
          commit_message: "Updating to version ${{ github.event.release.tag_name }} [skip ci]"

      - name: Update release tag with version changes commit
        if: ${{ !github.event.release.prerelease }}
        run: |
          git tag -f "${{ github.event.release.tag_name }}"
          git push -f origin "${{ github.event.release.tag_name }}"

      - name: Install dependencies
        run: uv sync --dev

      - name: Prepare ESPHome config secrets
        run: cp secrets.yaml.example secrets.yaml

      - name: Validate release firmware build
        run: ./scripts/build
        env:
          RTL433_ESPHOME_REF: ${{ github.event.release.tag_name }}

      - name: Update latest tag
        if: ${{ !github.event.release.prerelease }}
        run: |
          git tag -f latest
          git push -f origin latest

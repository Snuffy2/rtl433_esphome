name: Validation

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validation:
    name: Lint and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install uv
        run: python -m pip install uv

      - name: Install dependencies
        run: uv sync --dev

      - name: Run lint
        run: ./scripts/lint

      - name: Run tests
        run: ./.venv/bin/pytest

      - name: Prepare ESPHome config secrets
        run: cp secrets.yaml.example secrets.yaml

      - name: Validate ESPHome config
        run: ./.venv/bin/python -m esphome -s rtl433_esphome_ref v0.1.0 config rtl433-esphome-heltec-lora-32-v2.yaml
